<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saiga Llama 3 AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="chat-container">
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Спроси о чем угодно..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    // Разбитый токен для безопасности
    const s1 = "h", s2 = "f", s3 = "_";
    const p1 = s1 + s2 + s3;
    const p2 = "FKqdkWXOjETtPsZkGE";
    const p3 = "gTPrTcZPSPYvDvRk";
    const FINAL_TOKEN = p1 + p2 + p3;
    
    const API_URL = "https://huggingface.co";

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        input.value = '';

        const loadingId = addMessage("Сайга печатает...", 'bot');
        scrollToBottom();

        const prompt = `<|begin_of_text|><|start_header_id|>user<|end_header_id|>\n\n${text}<|eot_id|><|start_header_id|>assistant<|end_header_id|>\n\n`;

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Authorization": `Bearer ${FINAL_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({ inputs: prompt, parameters: { max_new_tokens: 500, temperature: 0.7 } })
            });

            const data = await response.json();
            let botText = "";
            
            if (data.error) {
                botText = "Модель просыпается (осталось ~20 сек). Попробуй отправить еще раз.";
            } else {
                botText = Array.isArray(data) ? data[0].generated_text : data.generated_text;
            }

            updateMessage(loadingId, botText.trim() || "Пустой ответ от сервера.");
            scrollToBottom();
        } catch (e) {
            updateMessage(loadingId, "Ошибка: проверь интернет или лимиты ключа.");
        }
    }

    function addMessage(text, side) {
        const id = Date.now();
        const div = document.createElement('div');
        div.className = `msg ${side}`;
        div.id = id;
        div.innerText = text;
        document.getElementById('messages').appendChild(div);
        return id;
    }

    function updateMessage(id, newText) {
        const el = document.getElementById(id);
        if (el) el.innerText = newText;
    }

    function scrollToBottom() {
        const msgContainer = document.getElementById('messages');
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }
</script>

</body>
</html>
